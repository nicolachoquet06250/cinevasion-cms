name: Deploy to Alwaysdata

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Create .env file
        run: |
          echo "GITHUB_PAGES_IMAGES=https://nicolachoquet06250.github.io/cinevasion-images" > dist/.env
          echo "GITHUB_PAGES_DATA=https://nicolachoquet06250.github.io/cinevasion-data" > dist/.env
          
          echo "EMAIL_SERVER_HOST=${{ secrets.EMAIL_HOST }}" > dist/.env
          echo "EMAIL_SERVER_PORT=${{ secrets.EMAIL_PORT }}" > dist/.env
          echo "EMAIL_SERVER_USER=${{ secrets.EMAIL_USER }}" > dist/.env
          echo "EMAIL_SERVER_PASSWORD=${{ secrets.EMAIL_PASSWORD }}" > dist/.env
          echo "AUTH_FROM=${{ secrets.EMAIL_USER }}" > dist/.env

      - name: Prepare package
        run: |
          cp package.json package-lock.json dist/


      - name: Deploy to Alwaysdata via SSH
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.ALWAYSDATA_SSH_HOST }}
          username: ${{ secrets.ALWAYSDATA_SSH_USER }}
          password: ${{ secrets.ALWAYSDATA_SSH_KEY }}
          source: "dist"
          target: "/home/nicolas-choquet/www/cinevasion-cms"
          strip_components: 1
          rm: true

      - name: Post-deployment commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.ALWAYSDATA_SSH_HOST }}
          username: ${{ secrets.ALWAYSDATA_SSH_USER }}
          password: ${{ secrets.ALWAYSDATA_SSH_KEY }}
          script: |
            cd /home/nicolas-choquet/www/cinevasion-cms
            npm install --production
          
            err=$(curl -X POST --basic --user "${{secrets.ALWAYSDATA_TOKEN}} account=${{secrets.ALWAYSDATA_USER}}:" https://api.alwaysdata.com/v1/site/${{secrets.ALWAYSDATA_SITE_ID}}/restart/ &>2);
            if [[ "${err}" -eq "" ]]; then
              echo "Redémarrage OK"
            else
              echo "Erreur : ${err}"
            fi
            
            
